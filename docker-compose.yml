services:

  db:
    image: postgres:15
    container_name: eventops_db
    restart: always
    environment:
      POSTGRES_DB: eventops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: eventops_redis
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: eventops_web
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  celery:
    build: .
    container_name: eventops_celery
    command: celery -A core.celery worker -l info
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - redis
      - db
  
  celery-beat:
    build: .
    container_name: eventops_celery_beat
    command: celery -A core.celery beat -l info
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - redis
      - db

# volumes for postgres data persistence
volumes:
  postgres_data: